name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        working-directory: /Users/seunghyeonmaegmini/classroom-tools

    steps:
      - name: Pull latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Build docker image
        run: docker compose build

      - name: Restart docker stack
        run: docker compose up -d --remove-orphans

      - name: Verify container
        run: |
          sleep 5
          docker ps --filter "name=classroom-tools" --format "{{.Status}}"
