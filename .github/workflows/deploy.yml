name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Show deployed commit
        run: git rev-parse --short HEAD

      - name: Build and restart docker stack
        run: docker compose up -d --build --force-recreate --remove-orphans

      - name: Verify container
        run: |
          sleep 5
          docker ps --filter "name=classroom-tools" --format "{{.Status}}"
