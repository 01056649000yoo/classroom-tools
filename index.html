<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문해력 서바이벌</title>
    <link rel="dns-prefetch" href="https://umami.끄적끄적아지트.site">
    <script defer src="https://umami.끄적끄적아지트.site/script.js" data-website-id="bed9f6db-dfda-4223-b60f-5bf45aabc8e5"></script>
    <script>
      // GitHub Pages SPA routing fallback
      (function () {
        const p = new URLSearchParams(window.location.search).get('p');
        if (p) window.history.replaceState(null, '', p);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;">
        <div style="width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#0f172a;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
        <span style="color:#94a3b8;font-size:14px;">불러오는 중...</span>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
