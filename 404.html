<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA fallback: redirect to index with path encoded in query string
      const path = window.location.pathname;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
